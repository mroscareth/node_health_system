name: Node watchdog

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run health checks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_node.py

      - name: Persist state (keepalive)
        run: |
          git config user.name "watchdog"
          git config user.email "watchdog@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state.json
          git diff --cached --quiet || { git commit -m "update watchdog state"; git push; }
